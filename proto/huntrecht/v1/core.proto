syntax = "proto3";

package huntrecht.v1;

option go_package = "github.com/huntrecht/sdk-go/proto/v1";
option java_multiple_files = true;
option java_package = "com.huntrecht.sdk.proto.v1";
option ruby_package = "Huntrecht::Proto::V1";
option csharp_namespace = "Huntrecht.SDK.Proto.V1";

// =============================================================================
// Common Types
// =============================================================================

message Pagination {
  int32 page = 1;
  int32 per_page = 2;
  int32 total = 3;
  int32 total_pages = 4;
  bool has_next = 5;
  bool has_prev = 6;
}

message CursorPagination {
  bool has_next = 1;
  string end_cursor = 2;
}

// =============================================================================
// Authentication
// =============================================================================

message TokenRequest {
  string grant_type = 1;            // "client_credentials" | "refresh_token"
  string client_id = 2;
  optional string client_secret = 3; // required for client_credentials
  optional string refresh_token = 4; // required for refresh_token
  optional string scope = 5;         // space-separated scopes
}

message TokenResponse {
  string access_token = 1;
  string token_type = 2;             // "Bearer"
  int32 expires_in = 3;              // seconds (1800)
  optional string refresh_token = 4; // only on client_credentials grant
  string scope = 5;                  // space-separated granted scopes
}

message RevokeTokenRequest {
  string token = 1;
}

message MessageResponse {
  string message = 1;
}

// =============================================================================
// API Clients
// =============================================================================

message ApiClientCreate {
  string client_name = 1;            // min 3, max 255
  optional string description = 2;
  optional string webhook_url = 3;
  repeated string ip_allowlist = 4;  // default []
  repeated string scopes = 5;        // default ["read"]
}

message ApiClientResponse {
  int32 id = 1;
  string client_id = 2;
  string client_name = 3;
  optional string description = 4;
  string status = 5;                 // active, inactive, revoked
  repeated string scopes = 6;
  repeated string ip_allowlist = 7;
  optional string webhook_url = 8;
  string created_at = 9;             // ISO 8601
  optional string last_used_at = 10; // ISO 8601
}

message ApiClientWithSecret {
  int32 id = 1;
  string client_id = 2;
  string client_name = 3;
  optional string description = 4;
  string status = 5;
  repeated string scopes = 6;
  repeated string ip_allowlist = 7;
  optional string webhook_url = 8;
  string created_at = 9;
  optional string last_used_at = 10;
  string client_secret = 11;         // shown only ONCE at creation
}

message ApiClientRotateResponse {
  string client_id = 1;
  string client_secret = 2;
  string message = 3;
}

// =============================================================================
// Users
// =============================================================================

message UserProfile {
  int32 id = 1;
  string email = 2;
  optional string first_name = 3;
  optional string last_name = 4;
  optional string phone = 5;
  string role = 6;
  repeated string permissions = 7;
  optional string company_name = 8;
  string subscription_plan = 9;      // starter, basic, standard, pro, enterprise
  bool email_verified = 10;
  string created_at = 11;            // ISO 8601
}

message UserDataResponse {
  UserProfile data = 1;
}

// =============================================================================
// Orders
// =============================================================================

message Order {
  string id = 1;
  string user_id = 2;
  string commodity = 3;
  double quantity = 4;
  string delivery_terms = 5;         // FOB, CIF, etc.
  optional string destination = 6;
  string currency = 7;
  string status = 8;                 // pending, confirmed, fulfilled, cancelled
  string created_at = 9;             // ISO 8601
  string updated_at = 10;
}

message OrderAggregate {
  int32 total_orders = 1;
  int32 pending = 2;
  int32 confirmed = 3;
  int32 fulfilled = 4;
  int32 cancelled = 5;
}

message OrderListResponse {
  repeated Order data = 1;
  Pagination pagination = 2;
  OrderAggregate aggregates = 3;
}

message OrderDataResponse {
  Order data = 1;
}

message OrderCreateResponse {
  Order data = 1;
  string message = 2;
}

// =============================================================================
// Payments
// =============================================================================

message Payment {
  string id = 1;
  string user_id = 2;
  int32 subscription_id = 3;
  double amount = 4;
  string currency = 5;
  string payment_method = 6;         // card, bank_transfer, crypto
  string status = 7;                 // pending, processing, completed, failed, refunded
  string created_at = 8;             // ISO 8601
  string updated_at = 9;
}

message PaymentListResponse {
  repeated Payment data = 1;
  Pagination pagination = 2;
}

message PaymentDataResponse {
  Payment data = 1;
}

message CreatePaymentRequest {
  int32 subscription_id = 1;
  double amount = 2;
  string currency = 3;               // default "USD"
  string payment_method = 4;         // default "card"
}

message PaymentCreateResponse {
  Payment data = 1;
  string message = 2;
}

// =============================================================================
// Subscriptions
// =============================================================================

message Subscription {
  string id = 1;
  string user_id = 2;
  string plan = 3;                   // starter, basic, standard, pro, enterprise
  string status = 4;                 // active, pending, cancelled, expired
  double amount = 5;
  string currency = 6;
  string billing_cycle = 7;          // monthly, quarterly, annual
  string start_date = 8;             // ISO 8601
  optional string end_date = 9;
  repeated PaymentHistoryItem payment_history = 10;
  string created_at = 11;
  string updated_at = 12;
}

message PaymentHistoryItem {
  string id = 1;
  double amount = 2;
  string status = 3;
  string paid_at = 4;                // ISO 8601
}

message SubscriptionListResponse {
  repeated Subscription data = 1;
  Pagination pagination = 2;
}

message SubscriptionDataResponse {
  Subscription data = 1;
}

// =============================================================================
// Credit Risk
// =============================================================================

message CreditAssessmentRequest {
  string customer_email = 1;
  bool include_recommendations = 2;
}

message CreditScoreData {
  int32 credit_score = 1;            // 300-850
  string risk_level = 2;             // low, medium, high, very_high
  optional int32 fico_equivalent = 3;
}

message CreditScoreResponse {
  CreditScoreData data = 1;
}

message CreditAssessmentData {
  int32 credit_score = 1;
  string risk_level = 2;
  repeated string factors = 3;
  repeated string recommendations = 4;
  string assessed_at = 5;            // ISO 8601
}

message CreditAssessmentResponse {
  CreditAssessmentData data = 1;
}

// =============================================================================
// KYC
// =============================================================================

message KycSubmission {
  string id = 1;
  string user_id = 2;
  string company_name = 3;
  string company_type = 4;
  optional string registration_number = 5;
  optional string address = 6;
  optional string contact_info = 7;
  string status = 8;                 // pending, under_review, approved, rejected
  string submitted_at = 9;           // ISO 8601
  optional string reviewed_at = 10;
}

message KycListResponse {
  repeated KycSubmission data = 1;
  Pagination pagination = 2;
}

message KycDataResponse {
  KycSubmission data = 1;
}

message KycSubmitRequest {
  string company_name = 1;
  string company_type = 2;
  optional string registration_number = 3;
  optional map<string, string> address = 4;
  optional map<string, string> contact_info = 5;
}

message KycSubmitResponse {
  KycSubmission data = 1;
  string message = 2;
}

// =============================================================================
// Quotes
// =============================================================================

message CommodityQuote {
  string id = 1;
  string user_id = 2;
  string commodity = 3;
  double quantity = 4;
  string unit = 5;                   // kg, ton, barrel, etc.
  optional string delivery_location = 6;
  double price = 7;
  string currency = 8;
  string status = 9;                 // pending, accepted, expired
  string valid_until = 10;           // ISO 8601
  string created_at = 11;
}

message QuoteListResponse {
  repeated CommodityQuote data = 1;
  Pagination pagination = 2;
}

message QuoteDataResponse {
  CommodityQuote data = 1;
}

message QuoteRequest {
  string commodity = 1;
  double quantity = 2;
  string unit = 3;                   // default "kg"
  optional string delivery_location = 4;
}

message QuoteCreateResponse {
  CommodityQuote data = 1;
  string message = 2;
}

// =============================================================================
// Storefront
// =============================================================================

message CollectionResponse {
  string id = 1;
  string title = 2;
  string handle = 3;
  optional string description = 4;
  optional string image_url = 5;
  optional string image_alt = 6;
}

message ProductResponse {
  string id = 1;
  string title = 2;
  string handle = 3;
  optional string description = 4;
  double price = 5;
  string currency = 6;               // default "USD"
  optional string image_url = 7;
  bool available = 8;
  bool b2b_exclusive = 9;
  optional double compare_at_price = 10;
}

message CollectionWithProducts {
  CollectionResponse collection = 1;
  repeated ProductResponse products = 2;
}

message CollectionsListResponse {
  repeated CollectionResponse data = 1;
  bool cached = 2;
}

message CollectionDataResponse {
  CollectionWithProducts data = 1;
  bool cached = 2;
}

message ProductListResponse {
  repeated ProductResponse data = 1;
  CursorPagination pagination = 2;
}

message ProductDataResponse {
  ProductResponse data = 1;
  bool cached = 2;
}

message SearchResponse {
  repeated ProductResponse data = 1;
  string query = 2;
  int32 count = 3;
}

// =============================================================================
// Price Drops
// =============================================================================

message PriceDropEvent {
  string product_id = 1;
  string product_title = 2;
  string product_handle = 3;
  double old_price = 4;
  double new_price = 5;
  string currency = 6;               // default "USD"
  optional string image_url = 7;
  optional string vendor = 8;
  double discount_percentage = 9;
}

message PriceDropListResponse {
  repeated PriceDropEvent data = 1;
  int32 count = 2;
}

message PriceDropFeaturedResponse {
  repeated PriceDropEvent data = 1;
  int32 count = 2;
  string headline = 3;
}

// =============================================================================
// App Proxy
// =============================================================================

message AppProxyCollectionsResponse {
  repeated CollectionResponse collections = 1;
}

message AppProxyCollectionResponse {
  CollectionResponse collection = 1;
  repeated ProductResponse products = 2;
}

message AppProxyPriceDropsResponse {
  repeated PriceDropEvent price_drops = 1;
  int32 count = 2;
  int32 max_discount = 3;
}

message PaymentMethod {
  string id = 1;
  string name = 2;
  string type = 3;                   // instalments, linked_bank, card
  bool available = 4;
}

message AppProxyPaymentMethodsResponse {
  repeated PaymentMethod payment_methods = 1;
  bool b2b_eligible = 2;
  bool linked_payments_available = 3;
}

// =============================================================================
// Linked Payments
// =============================================================================

message PaymentEligibilityResponse {
  bool eligible = 1;
  bool has_customer_role = 2;
  bool is_b2b_product = 3;
  repeated string available_methods = 4;
  string message = 5;
}

message LinkedWalletRequest {
  string customer_id = 1;
  optional string wallet_address = 2;
  optional string wallet_provider = 3;
}

message LinkedBankRequest {
  string customer_id = 1;
  optional string plaid_access_token = 2;
  optional string account_id = 3;
}

message LinkedWallet {
  string id = 1;
  string customer_id = 2;
  string wallet_address = 3;
  string wallet_provider = 4;
  string created_at = 5;             // ISO 8601
}

message LinkedBank {
  string id = 1;
  string customer_id = 2;
  string bank_name = 3;
  string account_masked = 4;
  string created_at = 5;             // ISO 8601
}

message LinkedAccountsResponse {
  repeated LinkedWallet wallets = 1;
  repeated LinkedBank banks = 2;
  bool has_linked_payments = 3;
}

message LinkPaymentResponse {
  bool success = 1;
  oneof linked_account {
    LinkedWallet wallet = 2;
    LinkedBank bank = 3;
  }
  string message = 4;
}

// =============================================================================
// Error
// =============================================================================

message Error {
  string error = 1;
  string error_description = 2;
  map<string, string> details = 3;
  string request_id = 4;
}
